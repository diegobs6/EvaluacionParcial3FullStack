spring:
  application:
    name: MicroService-Usuario

  datasource:
    url: jdbc:mysql://localhost:3306/db_usuario
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    enabled: true
    register-with-eureka: true
    fetch-registry: true

server:
  port: ${PORT:8081}
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /usuario/swagger-ui.html
  use-management-port: false