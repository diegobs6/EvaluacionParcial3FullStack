spring:
  application:
    name: MicroService-Usuario

  datasource:
    url: jdbc:${DATABASE_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

server:
  port: ${PORT:8081}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /usuario/swagger-ui.html