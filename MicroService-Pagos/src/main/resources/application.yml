spring:
  application:
    name: MicroService-Pagos

  datasource:
    url: jdbc:mysql://localhost:3306/db_pagos
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

server:
  port: 8087

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /pagos/swagger-ui.html

pedido:
  service:
    url: http://localhost:8086/v1/pedidos

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}