spring:
  application:
    name: MicroService-Pagos

  datasource:
    url: jdbc:mysql://localhost:3306/db_pagos
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

server:
  port: 8087

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /pagos/swagger-ui.html

pedido:
  service:
    url: http://localhost:8086/v1/pedidos