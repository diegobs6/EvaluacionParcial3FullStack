server:
  port: 8085

spring:
  application:
    name: MicroService-Carrito
  
  datasource:
    url: jdbc:mysql://localhost:3306/db_carrito
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  flyway:
    enabled: true
    ignore-migration-patterns: "*:*"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /carrito/swagger-ui.html

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

microservicios:
  usuarios:
    url: http://localhost:8081
