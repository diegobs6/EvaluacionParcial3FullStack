server:
  port: 8085

spring:
  application:
    name: MicroService-Carrito
  
  datasource:
    url: jdbc:mysql://localhost:3306/db_carrito
    username: root
    password:
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /carrito/swagger-ui.html
